services:
  backend:
    build: ./backend
    container_name: robot-backend
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: robot-frontend
    ports:
      - "8090:80"
    restart: unless-stopped
    depends_on:
      - backend
